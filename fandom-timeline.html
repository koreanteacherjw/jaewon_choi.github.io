<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>덕질 연혁 - 최재원</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --accent-light: #5dade2;
            --secondary: #7f8c8d;
            --bg: #ffffff;
            --bg-light: #f8f9fa;
            --border: #e0e0e0;
            --shadow: rgba(0,0,0,0.08);
            
            /* 카테고리별 색상 */
            --idol-girl-pure: #FFB6C1;
            --idol-girl-energy: #FF69B4;
            --singer: #9370DB;
            --actor: #20B2AA;
            --soloist: #FFA07A;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
            line-height: 1.7;
            color: var(--primary);
            background: var(--bg-light);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            padding: 40px 0 30px;
            margin-bottom: 60px;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: white;
        }

        nav {
            display: flex;
            gap: 24px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            transition: all 0.3s;
        }

        nav a:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }

        /* Page Header */
        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-header h1 {
            font-size: 2.8rem;
            margin-bottom: 16px;
            color: var(--primary);
            background: linear-gradient(135deg, var(--accent), #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header p {
            font-size: 1.15rem;
            color: var(--secondary);
        }

        /* Category Legend */
        .category-legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 80px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .legend-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--primary);
        }

        /* Timeline Wrapper */
        .timeline-wrapper {
            position: relative;
            margin-bottom: 120px;
        }

        /* Top Section */
        .top-section {
            margin-bottom: 100px;
        }

        .category-lane {
            margin-bottom: 40px;
            position: relative;
        }

        .lane-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .lane-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
        }

        .lane-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .artists-row {
            position: relative;
            height: 80px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow);
        }

        /* Central Timeline */
        .central-timeline {
            position: relative;
            height: 100px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 4px 16px var(--shadow);
            margin: 0 0 100px 0;
        }

        .timeline-line {
            position: absolute;
            top: 50%;
            left: 5%;
            right: 5%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 100%);
            transform: translateY(-50%);
        }

        .year-markers {
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 5%;
        }

        .year-marker {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .year-dot {
            width: 14px;
            height: 14px;
            background: var(--accent);
            border: 4px solid white;
            border-radius: 50%;
            box-shadow: 0 2px 6px var(--shadow);
            z-index: 2;
        }

        .year-label {
            position: absolute;
            top: 60%;
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: 8px;
        }

        /* Bottom Section */
        .bottom-section {
            margin-top: 0;
        }

        /* Artist Block */
        .artist-block {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-radius: 10px;
            box-shadow: 0 3px 10px var(--shadow);
            transition: all 0.3s;
            cursor: pointer;
        }

        .artist-block:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .artist-block.idol-girl-pure {
            background: linear-gradient(135deg, var(--idol-girl-pure), #FFD1DC);
        }

        .artist-block.idol-girl-energy {
            background: linear-gradient(135deg, var(--idol-girl-energy), #FF85A1);
        }

        .artist-block.singer {
            background: linear-gradient(135deg, var(--singer), #B19CD9);
        }

        .artist-block.actor {
            background: linear-gradient(135deg, var(--actor), #5FD4C8);
        }

        .artist-block.soloist {
            background: linear-gradient(135deg, var(--soloist), #FFB89A);
        }

        .artist-info {
            flex: 1;
            min-width: 0;
        }

        .artist-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            margin-bottom: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-period {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.95);
            font-weight: 600;
        }

        .artist-emoji {
            font-size: 1.8rem;
            margin-left: 10px;
            flex-shrink: 0;
        }

        /* Works Tooltip */
        .artist-works {
            position: absolute;
            bottom: calc(100% + 12px);
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: white;
            padding: 14px;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            min-width: 200px;
            max-width: 280px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 100;
        }

        .artist-block:hover .artist-works {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        .artist-works::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 7px solid transparent;
            border-top-color: white;
        }

        .works-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .works-list {
            list-style: none;
        }

        .work-item {
            padding: 3px 0;
            font-size: 0.85rem;
            color: var(--primary);
            display: flex;
            align-items: flex-start;
            gap: 6px;
            line-height: 1.4;
        }

        .work-item::before {
            content: '♪';
            font-size: 0.7rem;
            margin-top: 2px;
            flex-shrink: 0;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 0;
            color: var(--secondary);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            background: white;
            margin-top: 80px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .container {
                padding: 0 20px;
            }

            .artist-name {
                font-size: 1rem;
            }

            .artist-emoji {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 20px;
            }

            nav {
                flex-wrap: wrap;
                justify-content: center;
            }

            .page-header h1 {
                font-size: 2rem;
            }

            .year-label {
                font-size: 0.8rem;
            }

            .artist-block {
                height: 60px;
                padding: 0 12px;
            }

            .artist-name {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">최재원</a>
            <nav>
                <a href="index.html">홈</a>
                <a href="blog.html">블로그</a>
                <a href="index.html#contact">연락</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <h1>🎭 덕질 연혁</h1>
            <p>나의 취향을 만들어온 아티스트들의 바톤 터치</p>
        </div>

        <div class="category-legend">
            <div class="legend-item">
                <div class="legend-color" style="background: var(--idol-girl-pure);"></div>
                <span class="legend-label">청순 걸그룹</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: var(--idol-girl-energy);"></div>
                <span class="legend-label">에너지 걸그룹</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: var(--singer);"></div>
                <span class="legend-label">싱어송라이터</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: var(--actor);"></div>
                <span class="legend-label">배우</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: var(--soloist);"></div>
                <span class="legend-label">솔로 가수</span>
            </div>
        </div>

        <div class="timeline-wrapper">
            <!-- Top Section -->
            <div class="top-section" id="topSection"></div>

            <!-- Central Timeline -->
            <div class="central-timeline">
                <div class="timeline-line"></div>
                <div class="year-markers" id="yearMarkers"></div>
            </div>

            <!-- Bottom Section -->
            <div class="bottom-section" id="bottomSection"></div>
        </div>
    </div>

    <footer>
        <p>© 2024 최재원. 덕질은 인생의 양분 🌱</p>
    </footer>

    <script>
        // 덕질 데이터
        const fandomData = {
            minYear: 2011,
            maxYear: 2024,
            topCategories: [
                {
                    name: "청순 걸그룹",
                    icon: "🌸",
                    color: "idol-girl-pure",
                    artists: [
                        {
                            name: "Apink",
                            emoji: "🌸",
                            startYear: 2011,
                            endYear: 2014,
                            works: ["I Don't Know", "My My", "NoNoNo", "LUV"]
                        },
                        {
                            name: "여자친구",
                            emoji: "💫",
                            startYear: 2015,
                            endYear: 2019,
                            works: ["유리구슬", "시간을 달려서", "밤", "여름여름해"]
                        },
                        {
                            name: "오마이걸",
                            emoji: "🌈",
                            startYear: 2016,
                            endYear: 2024,
                            works: ["비밀정원", "Closer", "Dun Dun Dance", "살짝 설렜어"]
                        }
                    ]
                },
                {
                    name: "싱어송라이터",
                    icon: "🎤",
                    color: "singer",
                    artists: [
                        {
                            name: "아이유",
                            emoji: "🎤",
                            startYear: 2014,
                            endYear: 2024,
                            works: ["금요일에 만나요", "밤편지", "Blueming", "Love wins all"]
                        },
                        {
                            name: "윤하",
                            emoji: "🎵",
                            startYear: 2014,
                            endYear: 2024,
                            works: ["기다리다", "비가 내리는 날에는", "사건의 지평선", "Point"]
                        }
                    ]
                }
            ],
            bottomCategories: [
                {
                    name: "배우",
                    icon: "🎬",
                    color: "actor",
                    artists: [
                        {
                            name: "박보영",
                            emoji: "✨",
                            startYear: 2015,
                            endYear: 2024,
                            works: ["오 나의 귀신님", "청년경찰", "어비스", "경이로운 소문"]
                        },
                        {
                            name: "김소현",
                            emoji: "👻",
                            startYear: 2016,
                            endYear: 2022,
                            works: ["싸우자 귀신아", "Radio Romance", "그 해 우리는"]
                        },
                        {
                            name: "신지훈",
                            emoji: "🎬",
                            startYear: 2022,
                            endYear: 2024,
                            works: ["연애 대행사", "무빙", "사랑은 외나무다리에서"]
                        }
                    ]
                },
                {
                    name: "솔로 가수",
                    icon: "🎧",
                    color: "soloist",
                    artists: [
                        {
                            name: "한로로",
                            emoji: "🎙️",
                            startYear: 2020,
                            endYear: 2024,
                            works: ["Atlantis Princess", "경복궁에서", "별빛이 피면"]
                        },
                        {
                            name: "공원",
                            emoji: "🎧",
                            startYear: 2020,
                            endYear: 2024,
                            works: ["사랑 따윈 모르고 살았어", "고백", "네가 있던 여름"]
                        }
                    ]
                }
            ]
        };

        // 위치 계산 (5% 패딩 고려)
        function calculatePosition(startYear, endYear) {
            const { minYear, maxYear } = fandomData;
            const totalYears = maxYear - minYear;
            const usableWidth = 90; // 5% 양쪽 패딩
            const left = 5 + ((startYear - minYear) / totalYears) * usableWidth;
            const width = ((endYear - startYear + 1) / totalYears) * usableWidth;
            return { left: `${left}%`, width: `${width}%` };
        }

        // 년도 마커 생성
        function renderYearMarkers() {
            const container = document.getElementById('yearMarkers');
            const { minYear, maxYear } = fandomData;
            
            for (let year = minYear; year <= maxYear; year++) {
                const marker = document.createElement('div');
                marker.className = 'year-marker';
                marker.innerHTML = `
                    <div class="year-dot"></div>
                    <div class="year-label">${year}</div>
                `;
                container.appendChild(marker);
            }
        }

        // 아티스트 블록 생성
        function createArtistBlock(artist, color) {
            const pos = calculatePosition(artist.startYear, artist.endYear);
            const block = document.createElement('div');
            block.className = `artist-block ${color}`;
            block.style.left = pos.left;
            block.style.width = pos.width;
            
            const worksHTML = artist.works.map(work => 
                `<li class="work-item">${work}</li>`
            ).join('');
            
            block.innerHTML = `
                <div class="artist-info">
                    <div class="artist-name">${artist.name}</div>
                    <div class="artist-period">${artist.startYear} - ${artist.endYear === 2024 ? '현재' : artist.endYear}</div>
                </div>
                <div class="artist-emoji">${artist.emoji}</div>
                <div class="artist-works">
                    <div class="works-title">대표작</div>
                    <ul class="works-list">${worksHTML}</ul>
                </div>
            `;
            
            return block;
        }

        // 카테고리 레인 생성
        function createCategoryLane(category) {
            const lane = document.createElement('div');
            lane.className = 'category-lane';
            
            lane.innerHTML = `
                <div class="lane-header">
                    <div class="lane-icon" style="background: var(--${category.color});">
                        ${category.icon}
                    </div>
                    <div class="lane-title">${category.name}</div>
                </div>
                <div class="artists-row"></div>
            `;
            
            const artistsRow = lane.querySelector('.artists-row');
            category.artists.forEach(artist => {
                const block = createArtistBlock(artist, category.color);
                artistsRow.appendChild(block);
            });
            
            return lane;
        }

        // 렌더링
        function render() {
            // 년도 마커
            renderYearMarkers();
            
            // 상단 카테고리
            const topSection = document.getElementById('topSection');
            fandomData.topCategories.forEach(category => {
                topSection.appendChild(createCategoryLane(category));
            });
            
            // 하단 카테고리
            const bottomSection = document.getElementById('bottomSection');
            fandomData.bottomCategories.forEach(category => {
                bottomSection.appendChild(createCategoryLane(category));
            });
        }

        // 초기화
        render();
    </script>
</body>
</html>
