<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>독일어 완전 마스터</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
.container{max-width:1200px;margin:0 auto}
.header{text-align:center;color:white;margin-bottom:30px}
.header h1{font-size:2.5em;margin-bottom:10px;text-shadow:2px 2px 4px rgba(0,0,0,0.2)}
.header p{font-size:1.1em;opacity:0.9}
.mode-selector{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:30px}
.mode-card{background:white;border-radius:12px;padding:15px;cursor:pointer;transition:all 0.3s;box-shadow:0 5px 15px rgba(0,0,0,0.2);text-align:center}
.mode-card:hover{transform:translateY(-5px)}
.mode-card.active{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
.mode-card .icon{font-size:1.8em;margin-bottom:5px}
.mode-card h2{font-size:0.85em;margin-bottom:3px}
.mode-card p{font-size:0.7em;opacity:0.8}
.study-area{background:white;border-radius:15px;padding:40px;box-shadow:0 5px 15px rgba(0,0,0,0.2);min-height:500px}
.progress-bar{width:100%;height:8px;background:#e0e0e0;border-radius:10px;margin-bottom:30px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea 0%,#764ba2 100%);width:0%;transition:width 0.3s}
.score{text-align:center;font-size:1.3em;color:#667eea;margin-bottom:20px;font-weight:600}
.flashcard{perspective:1000px;min-height:350px}
.flashcard-inner{position:relative;width:100%;height:100%;min-height:350px;transition:transform 0.6s;transform-style:preserve-3d;cursor:pointer}
.flashcard-inner.flipped{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:15px;padding:30px}
.flashcard-front{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
.flashcard-back{background:white;border:3px solid #667eea;transform:rotateY(180deg)}
.word{font-size:3em;font-weight:bold;margin-bottom:20px}
.meaning{font-size:2.5em;color:#667eea;margin-bottom:20px}
.info{font-size:1.2em;color:#666;margin-top:15px}
.controls{display:flex;justify-content:center;gap:15px;margin-top:30px;flex-wrap:wrap}
.btn{padding:12px 30px;border:none;border-radius:25px;font-size:1.1em;font-weight:600;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 6px rgba(0,0,0,0.1)}
.btn-primary{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white}
.btn-primary:hover{transform:translateY(-2px)}
.btn-secondary{background:white;color:#667eea;border:2px solid #667eea}
.btn-secondary:hover{background:#667eea;color:white}
.quiz-question{text-align:center;margin-bottom:30px}
.quiz-question h3{font-size:2em;color:#333;margin-bottom:20px}
.quiz-word{font-size:2.5em;color:#667eea;font-weight:bold;margin:20px 0}
.quiz-options{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-top:20px}
.option{padding:20px;background:#f5f5f5;border-radius:10px;cursor:pointer;transition:all 0.3s;text-align:center;font-size:1.1em;border:2px solid transparent}
.option:hover{background:#e0e0e0;transform:translateY(-2px)}
.option.correct{background:#4caf50;color:white;border-color:#4caf50}
.option.wrong{background:#f44336;color:white;border-color:#f44336}
.option.disabled{pointer-events:none;opacity:0.7}
.result-message{font-size:1.8em;text-align:center;padding:20px;border-radius:10px;margin:20px 0}
.result-message.success{background:#4caf50;color:white}
.result-message.error{background:#ff9800;color:white}
.wrong-words{background:#fff3e0;border-left:4px solid #ff9800;padding:20px;border-radius:8px;margin:20px auto;max-width:700px}
.wrong-words h3{color:#f57c00;margin-bottom:15px;font-size:1.4em}
.wrong-word-item{display:block;padding:15px;margin:10px 0;background:white;border-radius:5px;border-left:3px solid #f44336}
.exercise-input{width:100%;padding:15px;border:2px solid #ddd;border-radius:8px;font-size:1.2em;margin-top:15px}
.exercise-input:focus{outline:none;border-color:#667eea}
.feedback{margin-top:15px;padding:15px;border-radius:8px;font-weight:600;display:none}
.feedback.correct{background:#4caf50;color:white;display:block}
.feedback.wrong{background:#f44336;color:white;display:block}
.verb-table{width:100%;max-width:600px;margin:20px auto;border-collapse:collapse}
.verb-table th{background:#667eea;color:white;padding:12px;text-align:left}
.verb-table td{padding:10px;border:1px solid #ddd}
.verb-table input{width:100%;padding:8px;border:1px solid #ddd;border-radius:4px}
.verb-table input.correct{background:#e8f5e9;border-color:#4caf50}
.verb-table input.wrong{background:#ffebee;border-color:#f44336}
.exercise-container{max-width:800px;margin:0 auto}
.exercise-question{background:#f9f9f9;padding:30px;border-radius:10px;margin-bottom:20px;border-left:4px solid #667eea}
.exercise-question h4{color:#667eea;margin-bottom:20px;font-size:1.3em}
.exercise-question p{font-size:1.2em;margin-bottom:20px;color:#333}
.writing-input{width:100%;max-width:500px;padding:20px;border:3px solid #667eea;border-radius:12px;font-size:1.5em;text-align:center;margin:20px auto;display:block}
.writing-input:focus{outline:none;border-color:#764ba2;box-shadow:0 0 10px rgba(102,126,234,0.3)}
@media(max-width:768px){.mode-selector{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

function getPronOptions(q){
switch(q.type){
case 'vowel_length':
return [{label:'장모음',value:'long'},{label:'단모음',value:'short'}];
case 'voiced_voiceless':
return [{label:'유성음',value:'voiced'},{label:'무성음',value:'voiceless'}];
case 'diphthong':
return [{label:'[au]',value:'au'},{label:'[ɔy]',value:'ɔy'},{label:'[ai]',value:'ai'}];
case 'ch_sound':
return [{label:'[ç] (연음)',value:'ç'},{label:'[x] (경음)',value:'x'}];
case 's_sound':
return [{label:'[s]',value:'s'},{label:'[ʃ]',value:'ʃ'},{label:'[tʃ]',value:'tʃ'}];
case 'stress':
return getStressOptions(q);
default:
return [];
}
}

function getStressOptions(q){
if(q.category==='separable'){
const w=q.word;
const pre=q.answer;
const rest=w.substring(pre.length-1);
return [
{label:pre,value:pre},
{label:'-'+rest.substring(0,Math.floor(rest.length/2))+'-',value:'-'+rest.substring(0,Math.floor(rest.length/2))+'-'},
{label:'-'+rest.substring(Math.floor(rest.length/2)),value:'-'+rest.substring(Math.floor(rest.length/2))}
];
}else{
const w=q.word;
return [
{label:w.substring(0,2)+'-',value:w.substring(0,2)+'-'},
{label:q.answer,value:q.answer},
{label:'-'+w.substring(w.length-2),value:'-'+w.substring(w.length-2)}
];
}
}

function checkPronAnswer(sel,cor,word,question){
const allOptions=document.querySelectorAll('#pronOptions .option');
allOptions.forEach(o=>{
o.classList.add('disabled');
const oval=o.getAttribute('data-value');
if(oval===cor){
o.classList.add('correct');
}else if(oval===sel&&sel!==cor){
o.classList.add('wrong');
}
});

if(sel===cor){
score++;
}else{
wrong.push({
question:word+' - '+question,
answer:getAnswerLabel(cor,pronQuestions[idx].type),
userAnswer:getAnswerLabel(sel,pronQuestions[idx].type)
});
}

setTimeout(()=>{
idx++;
renderPronQuestion();
},1500);
}

function getAnswerLabel(val,type){

voiced:'유성음',voiceless:'무성음',

ç:'[ç]',x:'[x]',
s:'[s]',ʃ:'[ʃ]',tʃ:'[tʃ]'
};
return labels[val]||val;
}

const q=mode==='ko_to_de'?ko:de;
const a=mode==='ko_to_de'?de:ko;
wrong.push({question:q,answer:a,userAnswer:sel});
}
setTimeout(()=>{idx++;mode==='ko_to_de'?renderKoDe():renderDeKo();},1500);
}

function checkAns(sel,cor){
document.querySelectorAll('.option').forEach(o=>{o.style.pointerEvents='none';

else if(o.textContent===sel&&sel!==cor)o.classList.add('wrong');});

}

function checkVerb(v){
const inp={ich:document.getElementById('ich').value.trim(),du:document.getElementById('du').value.trim(),er:document.getElementById('er').value.trim(),wir:document.getElementById('wir').value.trim(),ihr:document.getElementById('ihr').value.trim(),sie:document.getElementById('sie').value.trim()};
for(let k in inp){if(!inp[k]){alert('모든 칸을 채워주세요!');return;}}
let cnt=0;const ans=getConj(v);
for(let k in inp){
const el=document.getElementById(k);
if(inp[k].toLowerCase()===ans[k].toLowerCase()){el.classList.add('correct');cnt++;}
else{el.classList.add('wrong');el.value=inp[k]+' → '+ans[k];}
el.disabled=true;
}
if(cnt===6)score++;
setTimeout(()=>{idx++;renderVerb();},3000);
}

function getConj(v){
// 불규칙 동사 변화 (완전한 형태)
const irregulars={
'sein':{ich:'bin',du:'bist',er:'ist',wir:'sind',ihr:'seid',sie:'sind'},
'haben':{ich:'habe',du:'hast',er:'hat',wir:'haben',ihr:'habt',sie:'haben'},
'werden':{ich:'werde',du:'wirst',er:'wird',wir:'werden',ihr:'werdet',sie:'werden'},
'geben':{ich:'gebe',du:'gibst',er:'gibt',wir:'geben',ihr:'gebt',sie:'geben'},
'nehmen':{ich:'nehme',du:'nimmst',er:'nimmt',wir:'nehmen',ihr:'nehmt',sie:'nehmen'},
'lesen':{ich:'lese',du:'liest',er:'liest',wir:'lesen',ihr:'lest',sie:'lesen'},
'sehen':{ich:'sehe',du:'siehst',er:'sieht',wir:'sehen',ihr:'seht',sie:'sehen'},
'essen':{ich:'esse',du:'isst',er:'isst',wir:'essen',ihr:'esst',sie:'essen'},
'sprechen':{ich:'spreche',du:'sprichst',er:'spricht',wir:'sprechen',ihr:'sprecht',sie:'sprechen'},
'helfen':{ich:'helfe',du:'hilfst',er:'hilft',wir:'helfen',ihr:'helft',sie:'helfen'},
'treffen':{ich:'treffe',du:'triffst',er:'trifft',wir:'treffen',ihr:'trefft',sie:'treffen'},
'fahren':{ich:'fahre',du:'fährst',er:'fährt',wir:'fahren',ihr:'fahrt',sie:'fahren'},
'fallen':{ich:'falle',du:'fällst',er:'fällt',wir:'fallen',ihr:'fallt',sie:'fallen'},
'laufen':{ich:'laufe',du:'läufst',er:'läuft',wir:'laufen',ihr:'lauft',sie:'laufen'},
'schlafen':{ich:'schlafe',du:'schläfst',er:'schläft',wir:'schlafen',ihr:'schlaft',sie:'schlafen'},
'halten':{ich:'halte',du:'hältst',er:'hält',wir:'halten',ihr:'haltet',sie:'halten'},
'waschen':{ich:'wasche',du:'wäschst',er:'wäscht',wir:'waschen',ihr:'wascht',sie:'waschen'},
'tragen':{ich:'trage',du:'trägst',er:'trägt',wir:'tragen',ihr:'tragt',sie:'tragen'},
'wissen':{ich:'weiß',du:'weißt',er:'weiß',wir:'wissen',ihr:'wisst',sie:'wissen'},
'können':{ich:'kann',du:'kannst',er:'kann',wir:'können',ihr:'könnt',sie:'können'},
'müssen':{ich:'muss',du:'musst',er:'muss',wir:'müssen',ihr:'müsst',sie:'müssen'},
'dürfen':{ich:'darf',du:'darfst',er:'darf',wir:'dürfen',ihr:'dürft',sie:'dürfen'},
'sollen':{ich:'soll',du:'sollst',er:'soll',wir:'sollen',ihr:'sollt',sie:'sollen'},
'wollen':{ich:'will',du:'willst',er:'will',wir:'wollen',ihr:'wollt',sie:'wollen'},
'mögen':{ich:'mag',du:'magst',er:'mag',wir:'mögen',ihr:'mögt',sie:'mögen'}
};

// 불규칙 동사면 바로 반환
if(irregulars[v])return irregulars[v];

// 규칙 동사 처리
const s=v.slice(0,-2);
return{ich:s+'e',du:s+'st',er:s+'t',wir:v,ihr:s+'t',sie:v};
}

function renderGram(t){
let title='';
if(t==='articles'){gramEx=shuffle([...articlesEx]);title='📖 관사 문법';}
else if(t==='pronouns'){gramEx=shuffle([...pronounEx]);title='👤 대명사';}

}

function renderGQ(t,title){
if(idx>=total){showGramRes(t);return;}
const c=gramEx[idx];
document.getElementById('study-area').innerHTML=`
<div class="exercise-container">
<h2 style="text-align:center;color:#667eea;margin-bottom:20px">${title}</h2>
<div class="score">문제 ${idx+1}/${total} | 점수: ${score}/${total}</div>
<div class="progress-bar"><div class="progress-fill" style="width:${idx/total*100}%"></div></div>
<div class="exercise-question">
<h4>문제 ${idx+1}</h4><p>${c.q}</p>
<input type="text" class="exercise-input" id="ain" placeholder="답 입력..." onkeypress="if(event.key==='Enter')submitGram('${t}','${title}','${c.a.replace(/'/g,"\\'")}')">
<div class="feedback" id="fb"></div>
</div>
<div class="controls"><button class="btn btn-primary" onclick="submitGram('${t}','${title}','${c.a.replace(/'/g,"\\'")}')">제출</button></div></div>`;
document.getElementById('ain').focus();
}

function submitGram(t,title,cor){
const inp=document.getElementById('ain'),fb=document.getElementById('fb'),v=inp.value.trim();
if(!v){alert('답을 입력하세요!');return;}
const cors=cor.split(' ').join('').split('/').map(a=>a.trim().toLowerCase());
const nv=v.split(' ').join('').toLowerCase();
const ok=cors.some(a=>nv===a);
if(ok){score++;fb.className='feedback correct';fb.textContent='✅ 정답!';inp.disabled=true;}
else{fb.className='feedback wrong';fb.textContent=`❌ 정답: ${cor}`;inp.disabled=true;}
setTimeout(()=>{idx++;renderGQ(t,title);},2000);
}

function showGramRes(t){
const p=Math.round(score/total*100);
document.getElementById('study-area').innerHTML=`
<div style="text-align:center;padding:50px 20px">
<h2 style="font-size:2.5em;color:#667eea;margin-bottom:30px">🎉 완료!</h2>
<div style="font-size:3em;margin:30px 0">${score}/${total}</div>
<div style="font-size:1.5em;color:#666;margin-bottom:40px">정답률: ${p}%</div>
<div class="result-message ${p>=70?'success':'error'}">${p>=90?'🌟 완벽!':p>=70?'👍 잘했어요!':'💪 다시 도전!'}</div>
<div class="controls"><button class="btn btn-primary" onclick="renderGram('${t}')">🔄 다시</button></div></div>`;
}

function shuffle(a){
const n=[...a];
for(let i=n.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[n[i],n[j]]=[n[j],n[i]];}
return n;
}
